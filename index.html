<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WebApp</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&subset=cyrillic,latin&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
    body { 
      font-family: 'JetBrains Mono', 'Courier New', 'Consolas', monospace; 
      font-variant-ligatures: none;
      -webkit-user-select: none; user-select: none; 
      -webkit-tap-highlight-color: transparent;
    }

    #bg { 
      position: fixed; inset: 0; 
      background: url('https://raw.githubusercontent.com/kydas550-eng/kydas550-eng.github.io/main/zg0r0v2va7fe1.jpeg') center/cover no-repeat; 
      z-index: 1; transition: opacity 0.4s; 
    }
    
    #terminal { display: none; position: fixed; inset: 0; z-index: 2; }
    
    .crt-screen {
      display: flex; flex-direction: column;
      width: 100%; height: 100%;
      background: #020502;
      overflow: hidden;
      box-shadow: inset 0 0 100px rgba(0,0,0,0.85);
      border-radius: 12px;
      animation: crt-flicker 4s infinite alternate;
      will-change: opacity;
      transition: background 0.5s ease;
    }

    .crt-screen::before {
      content: ""; position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.2) 0px, rgba(0,0,0,0.2) 1px, transparent 1px, transparent 2px);
      pointer-events: none; z-index: 10;
    }

    .crt-screen::after {
      content: ""; position: absolute; inset: 0;
      background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.7) 100%);
      pointer-events: none; z-index: 11;
    }

    @keyframes crt-flicker {
      0%, 100% { opacity: 1; } 25% { opacity: 0.98; } 50% { opacity: 0.99; } 75% { opacity: 0.97; }
    }

    #output, #cmd-input {
      color: #33ff33;
      text-shadow: 0 0 5px rgba(51, 255, 51, 0.8), 0 0 12px rgba(51, 255, 51, 0.4);
      caret-color: #33ff33;
    }
    #terminal.pink-mode .crt-screen { background: #050204; }
    #terminal.pink-mode #output,
    #terminal.pink-mode #cmd-input {
      color: #ff66b2;
      text-shadow: 0 0 5px rgba(255, 102, 178, 0.8), 0 0 12px rgba(255, 102, 178, 0.4);
      caret-color: #ff66b2;
    }

    .noise {
      position: absolute; inset: 0;
      background: url("image/svg+xml;utf8,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.03; mix-blend-mode: screen; pointer-events: none; z-index: 9;
    }

    #output { flex: 1; overflow-y: auto; white-space: pre-wrap; padding: 20px; line-height: 1.4; }
    #input-line { display: flex; align-items: center; padding: 0 20px 20px; }
    #cmd-input { background: transparent; border: none; outline: none; font-family: inherit; font-size: inherit; flex: 1; }

    #output::-webkit-scrollbar { width: 6px; }
    #output::-webkit-scrollbar-track { background: #000; }
    #output::-webkit-scrollbar-thumb { background: #33ff33; border-radius: 3px; }
    #terminal.pink-mode #output::-webkit-scrollbar-thumb { background: #ff66b2; }
  </style>
</head>
<body>
  <div id="bg"></div>
  <div id="terminal">
    <div class="crt-screen">
      <div class="noise"></div>
      <div id="output"></div>
      <div id="input-line">
        <input type="text" id="cmd-input" autocomplete="off" spellcheck="false" autofocus>
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    const bg = document.getElementById('bg');
    const term = document.getElementById('terminal');
    const output = document.getElementById('output');
    const input = document.getElementById('cmd-input');
    
    let terminalState = 'IDLE'; 
    let tempLogin = '';
    let dialogueActive = false; 
    const CREDS = { login: 'Ан-30', pass: '30001' };
    const DIALOGUE_VARS = { reward: "Древний ключ активирован. Архивы разблокированы." };

    function activateTerminal() {
      if (terminalState !== 'IDLE') return;
      terminalState = 'LOGIN';
      term.classList.remove('pink-mode'); 
      
      if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
      bg.style.opacity = '0';
      setTimeout(() => {
        bg.style.display = 'none';
        term.style.display = 'flex';
        input.type = 'text';
        input.focus();
        output.textContent = 'login: ';
      }, 400);
    }

    // 📱 Только мобильные тапы (12 раз)
    let tapCount = 0, tapTimer = null;
    const TAP_LIMIT = 12, TAP_TIMEOUT = 2000;
    bg.addEventListener('click', (e) => {
      if (!('ontouchstart' in window) && !navigator.maxTouchPoints) return;
      if (terminalState !== 'IDLE') return;
      tapCount++; clearTimeout(tapTimer);
      tapTimer = setTimeout(() => { tapCount = 0; }, TAP_TIMEOUT);
      if (tapCount === TAP_LIMIT) { tapCount = 0; activateTerminal(); }
    });

    // ⌨️ Обработка ввода
    input.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      e.preventDefault();
      const val = input.value.trim();
      input.value = '';

      if (terminalState === 'LOGIN') {
        tempLogin = val; terminalState = 'PASSWORD';
        input.type = 'password'; output.textContent += '\npassword: ';
      } else if (terminalState === 'PASSWORD') {
        if (tempLogin === CREDS.login && val === CREDS.pass) {
          terminalState = 'ACTIVE'; input.type = 'text';
          term.classList.add('pink-mode');
          output.textContent += '\nACCESS GRANTED\n';
          startDialogue(); // 🟢 Запуск сценария
        } else {
          output.textContent += '\nACCESS DENIED\n';
          tempLogin = ''; terminalState = 'LOGIN';
          input.type = 'text'; term.classList.remove('pink-mode');
          output.textContent += 'login: ';
        }
      } else if (terminalState === 'ACTIVE' && !dialogueActive) {
        output.textContent += `\n> ${val}\n`;
        processCommand(val.toLowerCase());
      }
      input.focus();
    });

    // 🎬 ДВИЖОК ДИАЛОГОВ (Переписан)
    async function startDialogue() {
      dialogueActive = true;
      try {
        const res = await fetch('dialogue.txt');
        if (!res.ok) throw new Error('Файл не найден');
        const tree = parseDialogue(await res.text());
        await executeNode(tree);
      } catch (err) {
        console.warn('Диалог не загружен:', err);
        await typeText('Система: Сценарий недоступен.\n');
      }
      dialogueActive = false;
      terminalState = 'ACTIVE';
      input.focus();
    }

    function parseDialogue(text) {
      // Нормализуем табы в пробелы
      text = text.replace(/\t/g, '    ');
      const lines = text.split('\n')
        .map(l => l.replace(/\/\/.*$/, '').trim())
        .filter(l => l.length > 0);

      const root = { outputs: [], branches: [], isEnd: false };
      const stack = [{ node: root, indent: -1 }];

      for (const line of lines) {
        if (line === 'start:') continue;
        const indent = line.search(/\S/);
        const content = line.trim();

        while (stack.length > 1 && stack[stack.length - 1].indent >= indent) {
          stack.pop();
        }
        const parent = stack[stack.length - 1].node;

        if (content.startsWith('bot:')) {
          let val = content.slice(4).trim();
          if (val.startsWith('(') && val.endsWith(')')) {
            val = val.slice(1, -1).split(',').map(s => s.trim());
          }
          parent.outputs.push(val);
        } else if (content.startsWith(':')) {
          let val = content.slice(1).trim();
          if (parent.outputs.length > 0) {
            const last = parent.outputs[parent.outputs.length - 1];
            parent.outputs[parent.outputs.length - 1] = Array.isArray(last) ? val : last + '\n' + val;
          }
        } else if (content.startsWith('user:')) {
          let raw = content.slice(5).trim();
          let triggers = raw === '*' ? ['*'] : raw.slice(1, -1).split(',').map(s => s.trim().toLowerCase());
          const newNode = { outputs: [], branches: [], isEnd: false };
          parent.branches.push({ triggers, node: newNode });
          stack.push({ node: newNode, indent });
        } else if (content === 'end') {
          parent.isEnd = true;
        }
      }
      return root;
    }

    async function executeNode(node) {
      // 1. Вывод сообщений бота
      for (let msg of node.outputs) {
        if (Array.isArray(msg)) msg = msg[Math.floor(Math.random() * msg.length)];
        msg = msg.replace(/\{(\w+)\}/g, (_, k) => DIALOGUE_VARS[k] || `{${k}}`);
        await typeText(msg + '\n');
        await delay(250); // Пауза для естественности
      }

      if (node.isEnd) return;

      // 2. Ожидание ввода
      const userInput = await waitForInput();
      const inputLower = userInput.toLowerCase();

      // 3. Поиск ветки (точные совпадения > *)
      let branch = node.branches.find(b => b.triggers.includes(inputLower));
      if (!branch) branch = node.branches.find(b => b.triggers.includes('*'));

      if (branch) {
        await executeNode(branch.node);
      } else {
        await typeText('Система не распознала ввод. Попробуйте снова.\n');
        await executeNode(node); // Повторяем текущий узел
      }
    }

    function waitForInput() {
      return new Promise(resolve => {
        const handler = (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            const val = input.value.trim();
            input.value = '';
            input.removeEventListener('keydown', handler);
            resolve(val);
          }
        };
        input.addEventListener('keydown', handler);
      });
    }

    function delay(ms) {
      return new Promise(res => setTimeout(res, ms));
    }

    // ⌨️ Асинхронная печать
    function typeText(text) {
      return new Promise(resolve => {
        let i = 0;
        const interval = setInterval(() => {
          output.textContent += text[i];
          output.scrollTop = output.scrollHeight;
          i++;
          if (i >= text.length) { clearInterval(interval); resolve(); }
        }, 30);
      });
    }

    // 🗃️ Обычные команды (после диалога)
    function processCommand(cmd) {
      const db = {
        'help': 'Команды: help, status, clear',
        'status': 'Система: ONLINE | Задержка: 12ms',
        'clear': () => { output.textContent = ''; return ''; }
      };
      const res = typeof db[cmd] === 'function' ? db[cmd]() : (db[cmd] || 'Команда не распознана.');
      if (res) typeText(res + '\n');
    }

    // 🛡️ Защита
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
      if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase())) || (e.ctrlKey && e.key.toLowerCase() === 'u')) e.preventDefault();
    });
  </script>
</body>
</html>
