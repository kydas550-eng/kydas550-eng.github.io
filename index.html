<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WebApp</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&subset=cyrillic,latin&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
    body { 
      font-family: 'JetBrains Mono', 'Courier New', 'Consolas', monospace; 
      font-variant-ligatures: none;
      -webkit-user-select: none; user-select: none; 
      -webkit-tap-highlight-color: transparent;
    }

    #bg { 
      position: fixed; inset: 0; 
      background: url('https://raw.githubusercontent.com/kydas550-eng/kydas550-eng.github.io/main/zg0r0v2va7fe1.jpeg') center/cover no-repeat; 
      z-index: 1; transition: opacity 0.4s; 
    }
    
    #terminal { display: none; position: fixed; inset: 0; z-index: 2; }
    
    .crt-screen {
      position: relative;
      display: flex; flex-direction: column;
      width: 100%; height: 100%;
      background: #020502;
      overflow: hidden;
      box-shadow: inset 0 0 100px rgba(0,0,0,0.85);
      border-radius: 12px;
      animation: crt-flicker 4s infinite alternate;
      will-change: opacity;
      transition: background 0.5s ease;
    }

    .crt-screen::before {
      content: ""; position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.2) 0px, rgba(0,0,0,0.2) 1px, transparent 1px, transparent 2px);
      pointer-events: none; z-index: 10;
    }

    .crt-screen::after {
      content: ""; position: absolute; inset: 0;
      background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.7) 100%);
      pointer-events: none; z-index: 11;
    }

    @keyframes crt-flicker {
      0%, 100% { opacity: 1; } 25% { opacity: 0.98; } 50% { opacity: 0.99; } 75% { opacity: 0.97; }
    }

    /* Цвет терминала: логин/пароль → доступ → после VERIFIED */
    #terminal[data-theme="login"] .crt-screen { background: #050505; }
    #terminal[data-theme="login"] #output,
    #terminal[data-theme="login"] #cmd-input {
      color: #f0f0f0;
      text-shadow: 0 0 6px rgba(255, 255, 255, 0.35), 0 0 16px rgba(220, 220, 255, 0.12);
      caret-color: #ffffff;
    }
    #terminal[data-theme="access"] .crt-screen { background: #020502; }
    #terminal[data-theme="access"] #output,
    #terminal[data-theme="access"] #cmd-input {
      color: #33ff33;
      text-shadow: 0 0 5px rgba(51, 255, 51, 0.8), 0 0 12px rgba(51, 255, 51, 0.4);
      caret-color: #33ff33;
    }
    #terminal[data-theme="verified"] .crt-screen { background: #050204; }
    #terminal[data-theme="verified"] #output,
    #terminal[data-theme="verified"] #cmd-input {
      color: #ff66b2;
      text-shadow: 0 0 5px rgba(255, 102, 178, 0.8), 0 0 12px rgba(255, 102, 178, 0.4);
      caret-color: #ff66b2;
    }

    .noise {
      position: absolute; inset: 0;
      background: url("data:image/svg+xml;utf8,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.03; mix-blend-mode: screen; pointer-events: none; z-index: 9;
    }

    #output {
      flex: 1;
      overflow-y: auto;
      white-space: pre-wrap;
      padding: 20px;
      line-height: 1.4;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    #output a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 2px;
      word-break: break-all;
    }
    /* Фраза «ALICE IS WAITING» как ссылка — лазурь, поверх розового режима тоже */
    #output a.alice-waiting-link {
      color: #2ecbff;
      text-shadow: 0 0 10px rgba(46, 203, 255, 0.8), 0 0 24px rgba(0, 160, 210, 0.45);
      text-decoration: none;
      border-bottom: 1px solid rgba(46, 203, 255, 0.55);
      font-weight: 700;
      letter-spacing: 0.06em;
      word-break: normal;
      cursor: pointer;
    }
    #output a.alice-waiting-link:hover,
    #output a.alice-waiting-link:focus-visible {
      color: #9aebff;
      border-bottom-color: #9aebff;
      text-shadow: 0 0 14px rgba(154, 235, 255, 0.9), 0 0 28px rgba(46, 203, 255, 0.5);
      outline: none;
    }
    #output .terminal-line { white-space: pre-wrap; }
    #output::-webkit-scrollbar {
      display: none;
    }
    #input-line { display: flex; align-items: center; padding: 0 20px 20px; }
    #cmd-input { background: transparent; border: none; outline: none; font-family: inherit; font-size: inherit; flex: 1; }
  </style>
</head>
<body>
  <div id="bg"></div>
  <div id="terminal" data-theme="login">
    <div class="crt-screen">
      <div class="noise"></div>
      <div id="output"></div>
      <div id="input-line">
        <input type="text" id="cmd-input" autocomplete="off" spellcheck="false" autofocus>
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    const bg = document.getElementById('bg');
    const term = document.getElementById('terminal');
    const output = document.getElementById('output');
    const input = document.getElementById('cmd-input');

    function setTermTheme(theme) {
      term.dataset.theme = theme;
    }
    
    // 🎛️ Состояния системы
    let state = 'IDLE'; // IDLE, LOGIN, PASSWORD, DIALOGUE, COMMAND
    let tempLogin = '';
    let dialogueResolver = null; // Промис-резолвер для ожидания ввода в диалоге
    const CREDS = { login: 'Ан-30', pass: '30001' };
    const DIALOGUE_VARS = { reward: "Древний ключ активирован. Архивы разблокированы." };

    /** Текст «ALICE IS WAITING» (регистр не важен) становится лазурной ссылкой */
    const ALICE_WAITING_LINK = {
      href: 'https://t.me/+Da6aM1T7PGtkM2Ni',
    };

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    /** Ссылки в тексте → безопасный HTML (http(s), t.me/…, telegram.me/…) */
    function linkifyToHtml(raw) {
      const re = /(https?:\/\/[^\s<]+)|(t\.me\/[^\s<]+)|(telegram\.me\/[^\s<]+)/gi;
      let last = 0;
      let out = '';
      let m;
      while ((m = re.exec(raw)) !== null) {
        out += escapeHtml(raw.slice(last, m.index));
        let href;
        if (m[1]) href = m[1];
        else if (m[2]) href = 'https://' + m[2];
        else href = 'https://t.me/' + m[3].slice('telegram.me/'.length);
        const label = m[0];
        out += '<a href="' + escapeHtml(href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(label) + '</a>';
        last = m.index + m[0].length;
      }
      out += escapeHtml(raw.slice(last));
      return out;
    }

    function escapeAttr(s) {
      return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
    }

    function wrapAliceWaitingLink(html) {
      const href = escapeAttr(ALICE_WAITING_LINK.href);
      return html.replace(/ALICE\s+IS\s+WAITING/gi, (m) =>
        '<a class="alice-waiting-link" href="' + href + '">' + escapeHtml(m) + '</a>');
    }

    function appendOutputPlain(text) {
      output.appendChild(document.createTextNode(text));
      output.scrollTop = output.scrollHeight;
    }

    function maybeOpenTelegramLink(anchor, e) {
      const href = anchor.getAttribute('href');
      if (!href) return false;
      try {
        const u = new URL(href, window.location.href);
        const h = u.hostname.toLowerCase().replace(/^www\./, '');
        if (h !== 't.me' && h !== 'telegram.me') return false;
        if (!tg?.openTelegramLink) return false;
        e.preventDefault();
        tg.openTelegramLink('https://t.me' + u.pathname + u.search + u.hash);
        return true;
      } catch (_) {
        return false;
      }
    }

    /** Открыть чат/канал/бота внутри Telegram (Mini App), иначе обычный переход по ссылке */
    output.addEventListener('click', (e) => {
      const a = e.target.closest('a');
      if (!a || !output.contains(a)) return;
      maybeOpenTelegramLink(a, e);
    });

    // 🖱️ Активация терминала (12 тапов)
    function activateTerminal() {
      if (state !== 'IDLE') return;
      state = 'LOGIN';
      setTermTheme('login');

      if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
      bg.style.opacity = '0';
      setTimeout(() => {
        bg.style.display = 'none';
        term.style.display = 'flex';
        input.type = 'text';
        input.focus();
        output.innerHTML = '';
        appendOutputPlain('login: ');
      }, 400);
    }

    let tapCount = 0, tapTimer = null;
    const TAP_LIMIT = 8, TAP_TIMEOUT = 2000;
    bg.addEventListener('click', (e) => {
      if (!('ontouchstart' in window) && !navigator.maxTouchPoints) return;
      if (state !== 'IDLE') return;
      tapCount++; clearTimeout(tapTimer);
      tapTimer = setTimeout(() => { tapCount = 0; }, TAP_TIMEOUT);
      if (tapCount === TAP_LIMIT) { tapCount = 0; activateTerminal(); }
    });

    // ⌨️ ЕДИНЫЙ ОБРАБОТЧИК ВВОДА
    input.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      e.preventDefault();
      const val = input.value.trim();
      input.value = '';

      if (state === 'LOGIN') {
        tempLogin = val;
        state = 'PASSWORD';
        input.type = 'password';
        appendOutputPlain('\npassword: ');
      } 
      else if (state === 'PASSWORD') {
        if (tempLogin === CREDS.login && val === CREDS.pass) {
          state = 'DIALOGUE';
          input.type = 'text';
          setTermTheme('access');
          appendOutputPlain('\nACCESS GRANTED\n');
          // Небольшая задержка, чтобы сбросить буфер клавиатуры
          setTimeout(() => startDialogue(), 150);
        } else {
          appendOutputPlain('\nACCESS DENIED\n');
          tempLogin = '';
          state = 'LOGIN';
          input.type = 'text';
          setTermTheme('login');
          appendOutputPlain('login: ');
        }
      } 
      else if (state === 'DIALOGUE') {
        // Передаём ввод в движок диалога
        if (dialogueResolver) {
          dialogueResolver(val);
          dialogueResolver = null;
        }
      } 
      else if (state === 'COMMAND') {
        appendOutputPlain(`\n> ${val}\n`);
        processCommand(val.toLowerCase());
      }
      input.focus();
    });

    // 🎬 ДВИЖОК ДИАЛОГОВ
    async function startDialogue() {
      try {
        const res = await fetch('dialogue.txt');
        if (!res.ok) throw new Error('Файл не найден');
        const tree = parseDialogue(await res.text());
        await executeNode(tree);
      } catch (err) {
        console.warn('Диалог не загружен:', err);
        await typeText('Система: Сценарий недоступен.\n');
      }
      state = 'COMMAND';
      input.focus();
    }

    function parseDialogue(text) {
      text = text.replace(/\t/g, '    ');
      // Важно: не trim() всю строку — иначе теряются отступы и всё оказывается на корне (один «поток» бота).
      const lines = text.split('\n')
        .map(l => l.replace(/\/\/.*$/, '').replace(/\s+$/, ''))
        .filter(l => l.trim().length > 0);

      const root = { outputs: [], branches: [], isEnd: false };
      const stack = [{ node: root, indent: -1 }];

      for (const line of lines) {
        const content = line.trim();
        if (content === 'start:') continue;
        const indent = line.search(/\S/);
        if (indent < 0) continue;

        while (stack.length > 1 && stack[stack.length - 1].indent >= indent) stack.pop();
        const parent = stack[stack.length - 1].node;

        if (content.startsWith('bot:')) {
          let val = content.slice(4).trim();
          if (val.startsWith('(') && val.endsWith(')')) val = val.slice(1,-1).split(',').map(s=>s.trim());
          parent.outputs.push(val);
        } else if (content.startsWith(':')) {
          let val = content.slice(1).trim();
          if (parent.outputs.length > 0) {
            const last = parent.outputs[parent.outputs.length-1];
            if (Array.isArray(last)) {
              parent.outputs[parent.outputs.length-1] = last.map(v => v + '\n' + val);
            } else {
              parent.outputs[parent.outputs.length-1] = last + '\n' + val;
            }
          }
        } else if (content.startsWith('user:')) {
          let raw = content.slice(5).trim();
          let triggers;
          if (raw === '*') {
            triggers = ['*'];
          } else if (raw.startsWith('(') && raw.endsWith(')')) {
            triggers = raw.slice(1, -1).split(',').map(s => s.trim().toLowerCase()).filter(Boolean);
          } else {
            triggers = [raw.toLowerCase()];
          }
          const newNode = { outputs: [], branches: [], isEnd: false };
          parent.branches.push({ triggers, node: newNode });
          stack.push({ node: newNode, indent });
        } else if (content === 'end') {
          parent.isEnd = true;
        }
      }
      return root;
    }

    function pickBranch(branches, inputLower) {
      // Как в боте: одиночный триггер → группа → *
      const single = branches.find(
        b => b.triggers.length === 1 && b.triggers[0] !== '*' && b.triggers[0] === inputLower
      );
      if (single) return single;
      const group = branches.find(
        b => b.triggers.length > 1 && b.triggers.includes(inputLower)
      );
      if (group) return group;
      return branches.find(b => b.triggers.includes('*')) || null;
    }

    async function executeNode(node) {
      // 1. Вывод сообщений бота
      for (let msg of node.outputs) {
        if (Array.isArray(msg)) msg = msg[Math.floor(Math.random() * msg.length)];
        msg = msg.replace(/\{(\w+)\}/g, (_, k) => DIALOGUE_VARS[k] || `{${k}}`);
        if (msg.length) await typeText(msg + '\n');
        await delay(300); // Пауза между репликами
      }

      if (node.isEnd) return;

      // Лист без веток — только текст, без ожидания (иначе вечный цикл)
      if (!node.branches.length) return;

      // 2–3. Ждём ввод и ветвимся (без повторной печати всего узла при ошибке)
      for (;;) {
        const userInput = await waitForDialogueInput();
        const inputLower = userInput.toLowerCase();
        const branch = pickBranch(node.branches, inputLower);
        if (branch) {
          await executeNode(branch.node);
          return;
        }
        await typeText('Система не распознала ввод. Попробуйте снова.\n');
      }
    }

    function waitForDialogueInput() {
      return new Promise(resolve => {
        dialogueResolver = resolve;
      });
    }

    function delay(ms) {
      return new Promise(res => setTimeout(res, ms));
    }

    // ⌨️ Асинхронная печать + кликабельные ссылки после строки
    function typeText(text) {
      return new Promise(resolve => {
        if (!text.length) {
          resolve();
          return;
        }
        const line = document.createElement('div');
        line.className = 'terminal-line';
        output.appendChild(line);
        let i = 0;
        const interval = setInterval(() => {
          if (i >= text.length) {
            clearInterval(interval);
            line.innerHTML = wrapAliceWaitingLink(linkifyToHtml(text));
            if (/\bVERIFIED\b/i.test(text)) setTermTheme('verified');
            output.scrollTop = output.scrollHeight;
            resolve();
            return;
          }
          line.textContent = text.slice(0, i + 1);
          output.scrollTop = output.scrollHeight;
          i++;
        }, 30);
      });
    }

    // 🗃️ Команда → другой HTML (файлы рядом с index.html на том же хосте)
    // Ключи в нижнем регистре: ввод нормализуется через .toLowerCase()
    const COMMAND_PAGES = {
      'BL4CK_PYRAM1D.exe -alice': 'player.html',
    };

    // 🗃️ Обычные команды (после диалога)
    function processCommand(cmd) {
      const target = COMMAND_PAGES[cmd];
      if (target) {
        if (/^https:\/\/t\.me\//i.test(target) && tg?.openTelegramLink) {
          tg.openTelegramLink(target);
          return;
        }
        window.location.href = target;
        return;
      }
      const db = {
        'help': 'Команды: help, status, clear',
        'status': 'Система: ONLINE | Задержка: 12ms',
        'clear': () => { output.innerHTML = ''; return ''; }
      };
      const res = typeof db[cmd] === 'function' ? db[cmd]() : (db[cmd] || 'Команда не распознана.');
      if (res) typeText(res + '\n');
    }

    // 🛡️ Защита
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
      if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase())) || (e.ctrlKey && e.key.toLowerCase() === 'u')) e.preventDefault();
    });
  </script>
</body>
</html>
